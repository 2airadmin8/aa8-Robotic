name: Build and deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site with safe fallback
        shell: bash
        run: |
          set +e
          python -m py_compile scripts/build_site.py > build.log 2>&1
          COMPILE_STATUS=$?

          if [ "$COMPILE_STATUS" -eq 0 ]; then
            python scripts/build_site.py >> build.log 2>&1
            BUILD_STATUS=$?
          else
            BUILD_STATUS=$COMPILE_STATUS
          fi

          if [ "$BUILD_STATUS" -ne 0 ] || [ ! -f "_site/index.html" ]; then
            echo "Primary build failed. Publishing safe static fallback." | tee -a build.log
            rm -rf _site
            mkdir -p _site
            rsync -a ./ _site/ \
              --exclude '.git/' \
              --exclude '.github/' \
              --exclude '_site/' \
              --exclude 'scripts/'

            python - <<'PY'
          import json
          from pathlib import Path

          log = Path("build.log").read_text(encoding="utf-8", errors="replace")
          report = {
              "status": "fallback_build",
              "message": "Primary build failed; raw static files were published.",
              "build_log_tail": log[-12000:],
          }
          Path("_site/qa-report.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY
          else
            echo "Primary build completed successfully." | tee -a build.log
          fi

          test -f _site/index.html
          test -f _site/qa-report.json
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-build-diagnostics
          path: |
            build.log
            _site/qa-report.json
          retention-days: 30

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4